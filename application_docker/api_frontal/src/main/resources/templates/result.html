<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Résultat</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow border-start border-5" th:classappend="${prediction == 'Normal' ? 'border-success' : 'border-danger'}">
            <div class="card-body">
                <h1>Résultat : <span th:text="${prediction}"></span></h1>
                <p>Probabilité de santé : <span th:text="${#numbers.formatDecimal(probability * 100, 1, 2)}"></span>%</p>
                <p>Modèle utilisé : <span th:text="${modelUsed}"></span></p>
                <a href="/" class="btn btn-secondary">Retour</a>
            </div>
        </div>
    </div>
</body>
</html>
