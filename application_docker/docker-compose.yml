services:
  ia-service:
    build: ./ia_service
    container_name: ia-service
    ports:
      - "5000:5000"
    volumes:
      - ./ia_service/models:/app/models

  api-frontal:
    build: ./api_frontal
    container_name: api-frontal
    ports:
      - "8080:8080"
    environment:
      - IA_SERVICE_URL=http://ia-service:5000/predict
    depends_on:
      - ia-service